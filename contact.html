<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - AstraPlayersOff_FRF</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; color: #cbd5e1; }
        .form-control { 
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; 
            color: white; font-size: 1rem; outline: none;
        }
        .form-control:focus { border-color: #a78bfa; }
    </style>
</head>
<body>

    <div class="bulla-container">
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
    </div>

    <header class="main-header">
        <div class="header-content">
            <div class="logo-container">
                <img src="logo.png" alt="AstraPlayers" class="site-logo">
            </div>
            <nav class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="videos.html">الفيديوهات</a>
                <a href="games.html">ألعابنا</a>
                <a href="links.html">روابطنا</a>
                <a href="contact.html">تواصل معنا</a>
            </nav>
        </div>
    </header>

    <main class="content-area">
        <section class="hero" style="max-width: 550px;">
            <h1>تواصل معنا</h1>
            <p>هل لديك اقتراح أو استفسار؟ أرسل لنا رسالة مباشرة :</p>
            
            <!-- FORMULAIRE CORRIGÉ AVEC TA CLÉ WEB3FORMS ET LE STYLE RETROUVÉ -->
            <form action="https://api.web3forms.com/submit" method="POST" style="margin-top: 25px;">
                
                <!-- Ta clé Web3Forms conservée -->
                <input type="hidden" name="access_key" value="11448954-e8b1-4f87-8fa1-425679152183">
                
                <!-- Redirection automatique vers ton accueil après l'envoi -->
                <input type="hidden" name="redirect" value="https://astraplayers.github.io/index.html">

                <div class="form-group">
                    <label>الاسم :</label>
                    <input type="text" name="name" class="form-control" placeholder="اسمك الكريم" required>
                </div>
                
                <div class="form-group">
                    <label>البريد الإلكتروني :</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
                
                <div class="form-group">
                    <label>الرسالة :</label>
                    <textarea name="message" class="form-control" rows="5" placeholder="اكتب رسالتك هنا..." required></textarea>
                </div>
                
                <button type="submit" class="btn-youtube" style="border: none; width: 100%; cursor: pointer;">إرسال الرسالة</button>
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <p>جميع الحقوق محفوظة © 2026 | AstraPlayersOff_FRF</p>
    </footer>

</body>
</html>
