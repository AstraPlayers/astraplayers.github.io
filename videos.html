<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفيديوهات - AstraPlayersOff_FRF</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bulla-container">
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
    </div>

    <header class="main-header">
        <div class="header-content">
            <div class="logo-container">
                <img src="logo.png" alt="AstraPlayers" class="site-logo">
            </div>
            <nav class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="videos.html">الفيديوهات</a>
                <a href="games.html">ألعابنا</a>
                <a href="links.html">روابطنا</a>
                <a href="contact.html">تواصل معنا</a>
            </nav>
        </div>
    </header>

    <main class="content-area">
        <section class="hero" style="max-width: 1000px;">
            <h1>أحدث 5 فيديوهات على القناة</h1>
            <p>تابع آخر مقاطعي مباشرة من هنا :</p>
            
            <div id="youtube-videos-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px;">
                <p style="color: #cbd5e1;">جاري تحميل الفيديوهات...</p>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>جميع الحقوق محفوظة © 2026 | AstraPlayersOff_FRF</p>
    </footer>

    <script>
        const channelId = "UClP0uD9xUHVQhXiUmXwjhcg"; // Ton ID de chaîne basé sur @AstraPlayersOff_FRF
        const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('youtube-videos-container');
                container.innerHTML = ''; // On vide le texte de chargement

                if (data.items && data.items.length > 0) {
                    // On prend uniquement les 5 premières vidéos
                    const latestVideos = data.items.slice(0, 5);

                    latestVideos.forEach(video => {
                        // On extrait l'ID de la vidéo depuis son URL
                        const videoId = video.link.split('v=')[1];
                        
                        const videoCard = document.createElement('div');
                        videoCard.style.cssText = "background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);";

                        videoCard.innerHTML = `
                            <iframe width="100%" height="180" src="https://www.youtube.com/embed/${videoId}" style="border: none; border-radius: 8px;" allowfullscreen></iframe>
                            <h3 style="margin-top: 12px; font-size: 1rem; color: #fff; text-align: right; line-height: 1.4;">${video.title}</h3>
                        `;
                        container.appendChild(videoCard);
                    });
                } else {
                    container.innerHTML = '<p style="color: #ff4444;">لم يتم العثور على فيديوهات حالياً.</p>';
                }
            })
            .catch(error => {
                console.error("Erreur YouTube API:", error);
                document.getElementById('youtube-videos-container').innerHTML = '<p style="color: #ff4444;">خطأ في تحميل الفيديوهات. يرجى المحاولة لاحقاً.</p>';
            });
    </script>

</body>
</html>
